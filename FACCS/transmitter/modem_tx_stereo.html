<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Transcribe</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 24px; max-width: 640px; margin: 0 auto; }
  h1 { color: #4a9; margin: 0 0 4px 0; }
  .rate { color: #888; font-size: 12px; margin-bottom: 16px; }
  #drop { border: 2px dashed #555; padding: 40px; text-align: center; margin-bottom: 16px; cursor: pointer; }
  #drop.hover { border-color: #4a9; background: #223; color: #4a9; }
  #filesummary { font-size: 12px; color: #aaa; margin-bottom: 12px; min-height: 16px; }
  button { padding: 14px 28px; background: #4a9; color: #000; border: 0; font-family: monospace; font-size: 15px; cursor: pointer; margin: 6px 6px 0 0; font-weight: bold; }
  button:hover:not(:disabled) { background: #6cb; }
  button:disabled { background: #444; color: #888; cursor: not-allowed; }
  .progress { display: none; width: 100%; height: 20px; background: #1a1a1a; border: 1px solid #333; margin-top: 12px; overflow: hidden; position: relative; }
  .progress.active { display: block; }
  .progress-fill { height: 100%; background: #4a9; width: 0%; transition: width 0.08s linear; }
  .progress-label { position: absolute; top: 0; left: 0; right: 0; text-align: center; line-height: 20px; font-size: 12px; color: #eee; text-shadow: 0 0 2px #000; pointer-events: none; }
  #status { padding: 14px; background: #1a1a1a; margin-top: 14px; border-left: 3px solid #4a9; font-size: 13px; white-space: pre-wrap; }
  #status.err { border-left-color: #e55; }
</style>
</head>
<body>
<h1>Transcribe</h1>
<div class="rate">Turbo Transcription</div>
<div id="drop">Drop file, or click to browse</div>
<input type="file" id="fileinput" style="display:none">
<div id="filesummary">No file loaded.</div>

<div>
  <button id="play" disabled>▶ Play</button>
  <button id="stopPlay" disabled>■ Stop</button>
</div>

<div class="progress" id="encProgress"><div class="progress-fill" id="encFill"></div><div class="progress-label" id="encLabel"></div></div>
<div class="progress" id="playProgress"><div class="progress-fill" id="playFill"></div><div class="progress-label" id="playLabel"></div></div>

<div id="status">Waiting for file.</div>

<script src="amodem_tx_stereo.js"></script>
</body>
</html>
